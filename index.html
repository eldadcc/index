<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', 'Courier New', monospace;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #000000;
      border-radius: 4px;
      overflow: hidden;
    }

    .header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .label-small {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.06em;
      color: #f0f0f0;
      line-height: 1;
    }

    .title span { color: #c8f135; }

    .input-wrap {
      padding: 1.8rem 2rem;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }

    .currency-sign {
      position: absolute;
      left: 2.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #444;
      pointer-events: none;
    }

    .meal-input {
      width: 100%;
      background: #000000;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      color: #f0f0f0;
      font-family: 'DM Mono', monospace;
      font-size: 1.4rem;
      font-weight: 400;
      padding: 0.8rem 1rem 0.8rem 2.4rem;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .meal-input::-webkit-outer-spin-button,
    .meal-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .meal-input:focus { border-color: #c8f135; }
    .meal-input::placeholder { color: #333; }

    .table-wrap { padding: 0 2rem 2rem; }

    .col-headers {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding: 1.2rem 0 0.5rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .col-head {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
      text-align: right;
    }

    .col-head:first-child { text-align: left; color: #2a2a2a; }

    .data-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid #111;
      align-items: center;
    }

    .data-row:last-of-type { border-bottom: none; }

    .meal-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding: 1rem 0 0.8rem;
      border-bottom: 1px solid #1a1a1a;
      align-items: center;
    }

    .meal-label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    .meal-amount {
      text-align: right;
      font-size: 1.25rem;
      color: #444;
      grid-column: span 2;
      cursor: pointer;
      border-radius: 3px;
      padding: 0.15rem 0.3rem;
      transition: background 0.15s, color 0.15s;
    }

    .meal-amount.active { color: #555; }

    .badge {
      display: inline-block;
      border-radius: 2px;
      padding: 0.3rem 0.6rem;
      font-size: 1rem;
      letter-spacing: 0.08em;
    }

    .badge-10 { background: #1a2e00; color: #c8f135; }
    .badge-12 { background: #001a2e; color: #35c8f1; }

    .amount {
      text-align: right;
      font-size: 1.25rem;
      font-weight: 400;
      color: #222;
      border-radius: 3px;
      padding: 0.15rem 0.3rem;
      transition: all 0.15s;
      cursor: default;
    }

    .amount.clickable { cursor: pointer; }
    .amount.clickable:active { opacity: 0.6; }

    .amount.active-10 { color: #c8f135; }
    .amount.active-12 { color: #35c8f1; }
    .amount.total-10  { color: #e8ffa0; font-weight: 500; }
    .amount.total-12  { color: #a0e8ff; font-weight: 500; }
    .amount.flashed, .meal-amount.flashed { background: #1e1e1e; }

    .copy-hint {
      display: none;
      text-align: center;
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      color: #222;
      text-transform: uppercase;
      padding-top: 1.2rem;
    }

    .copy-toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #c8f135;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
      pointer-events: none;
      animation: fadeup 0.2s ease;
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="label-small">restaurant</div>
      <div class="title">TIP<span>.</span>CALC</div>
    </div>

    <div class="input-wrap">
      <span class="currency-sign">₪</span>
      <input
        id="mealInput"
        class="meal-input"
        type="number"
        inputmode="decimal"
        placeholder="0.00"
      />
    </div>

    <div class="table-wrap">
      <div class="col-headers">
        <div class="col-head">tip</div>
        <div class="col-head">tip amt</div>
        <div class="col-head">total</div>
      </div>

      <div class="meal-row">
        <div class="meal-label">meal</div>
        <div id="mealDisplay" class="meal-amount" style="grid-column: span 2">—</div>
      </div>

      <div class="data-row">
        <div><span class="badge badge-10">10%</span></div>
        <div id="tip10"   class="amount">—</div>
        <div id="total10" class="amount">—</div>
      </div>

      <div class="data-row">
        <div><span class="badge badge-12">12%</span></div>
        <div id="tip12"   class="amount">—</div>
        <div id="total12" class="amount">—</div>
      </div>

      <span id="copyHint" class="copy-hint">tap any amount to copy</span>
    </div>
  </div>

  <div id="toast" class="copy-toast">copied ✓</div>

  <script>
    const input       = document.getElementById('mealInput');
    const mealDisplay = document.getElementById('mealDisplay');
    const tip10El     = document.getElementById('tip10');
    const total10El   = document.getElementById('total10');
    const tip12El     = document.getElementById('tip12');
    const total12El   = document.getElementById('total12');
    const copyHint    = document.getElementById('copyHint');
    const toast       = document.getElementById('toast');

    let toastTimer, flashTimer;

    const fmt = (n) => n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function update() {
      const meal = parseFloat(input.value) || 0;

      if (meal > 0) {
        const tip10   = meal * 0.10;
        const tip12   = meal * 0.12;
        const total10 = meal + tip10;
        const total12 = meal + tip12;

        mealDisplay.textContent = '₪ ' + fmt(meal);
        mealDisplay.className   = 'meal-amount active';
        mealDisplay.onclick     = () => copy(meal, mealDisplay);

        tip10El.textContent   = '₪ ' + fmt(tip10);
        tip10El.className     = 'amount active-10 clickable';
        tip10El.onclick       = () => copy(tip10, tip10El);

        total10El.textContent = '₪ ' + fmt(total10);
        total10El.className   = 'amount total-10 clickable';
        total10El.onclick     = () => copy(total10, total10El);

        tip12El.textContent   = '₪ ' + fmt(tip12);
        tip12El.className     = 'amount active-12 clickable';
        tip12El.onclick       = () => copy(tip12, tip12El);

        total12El.textContent = '₪ ' + fmt(total12);
        total12El.className   = 'amount total-12 clickable';
        total12El.onclick     = () => copy(total12, total12El);

        copyHint.style.display = 'block';
      } else {
        [mealDisplay, tip10El, total10El, tip12El, total12El].forEach(el => {
          el.textContent = '—';
          el.onclick = null;
        });
        mealDisplay.className = 'meal-amount';
        tip10El.className = tip12El.className = total10El.className = total12El.className = 'amount';
        copyHint.style.display = 'none';
      }
    }

    function copy(value, el) {
      navigator.clipboard.writeText(fmt(value)).then(() => {
        el.classList.add('flashed');
        clearTimeout(flashTimer);
        flashTimer = setTimeout(() => el.classList.remove('flashed'), 1200);

        toast.style.display = 'block';
        toast.style.animation = 'none';
        toast.offsetHeight; // reflow to restart animation
        toast.style.animation = 'fadeup 0.2s ease';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.style.display = 'none', 1200);
      });
    }

    input.addEventListener('input', update);
    input.addEventListener('focus', () => input.select());
  </script>
</body>
</html>
